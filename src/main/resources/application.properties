spring.application.name=send-receive-sms-messages-java

# Configure structured logging to log to the console in ECS (Elastic Common Schema) format
logging.structured.format.console=ecs
logging.level.root=INFO
logging.level.org.springframework.web=INFO

# Initialise three Twilio-specific variables from related environment variables

# This is your Twilio Account SID which is, effectively, your username
# You can find this in the API keys & auth tokens section of the Twilio Console
twilio.account_sid=${TWILIO_ACCOUNT_SID}

# This is your Twilio Auth Token which is, effectively, your password
# You can find this in the API keys & auth tokens section of the Twilio Console
twilio.auth_token=${TWILIO_AUTH_TOKEN}

# The second is used as the sender of SMS sent from the application.
# This is your Twilio phone number in E.164 format.
twilio.phone_number=${TWILIO_PHONE_NUMBER}
